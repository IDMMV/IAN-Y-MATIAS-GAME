<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  :root {
    --primary: #7C3AED;
    --primary-dark: #5B21B6;
    --secondary: #FF4D9D;
    --accent: #FFD600;
    --card-bg: #FFFFFF;
    --card-hover: #FFF8E7;
    --text: #2D1B4E;
    --muted: #7A6B9D;
    --action: #00D68F;
    --racing: #FF6B00;
    --puzzle: #00B4D8;
    --arcade: #FF4D9D;
    --multi: #FFB800;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #FF9A3C 0%, #FF4D9D 45%, #7C3AED 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.5s;
  }
  body.theme-fiesta  { background: linear-gradient(135deg, #FF9A3C 0%, #FF4D9D 45%, #7C3AED 100%); }
  body.theme-espacio { background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 50%, #7C3AED 100%); }
  body.theme-oceano  { background: linear-gradient(135deg, #0EA5E9 0%, #06b6d4 50%, #0d9488 100%); }
  body.theme-dulces  { background: linear-gradient(135deg, #FBCFE8 0%, #C4B5FD 50%, #A7F3D0 100%); }
  body.theme-selva   { background: linear-gradient(135deg, #15803d 0%, #65a30d 50%, #ca8a04 100%); }
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star {
    position: absolute;
    animation: float var(--d, 8s) ease-in-out infinite alternate;
    opacity: 0.5;
    font-size: var(--sz, 24px);
  }
  @keyframes float {
    from { transform: translateY(0) rotate(0deg); }
    to { transform: translateY(-40px) rotate(20deg); }
  }
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(16px);
    border-bottom: 4px solid var(--accent);
    padding: 0 24px;
    height: 70px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(124,58,237,0.15);
  }
  .brand-area { display: flex; flex-direction: column; gap: 2px; }
  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    background: linear-gradient(135deg, var(--primary), var(--secondary), var(--racing));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
    line-height: 1.1;
  }
  .logo span { color: var(--accent); -webkit-text-fill-color: var(--accent); }
  .family-text {
    font-size: 0.72rem; font-weight: 700; color: var(--muted);
    letter-spacing: 0.5px; white-space: nowrap;
  }
  .nav-links {
    display: flex; gap: 8px; list-style: none;
  }
  .nav-links a {
    text-decoration: none; color: var(--muted);
    font-weight: 800; font-size: 0.85rem;
    padding: 8px 16px; border-radius: 20px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .nav-links a:hover, .nav-links a.active {
    background: var(--primary); color: white;
  }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  @media (min-width: 601px) {
    nav { justify-content: flex-start; }
    .brand-area { margin-right: auto; }
    #cuentaBtn { order: 99; margin-left: 10px; }
  }
</style>
</head>

<script>
// Verificar que los juegos cargaron
console.log('Juegos cargados:', Object.keys(window).filter(k => k.startsWith('build')).length);

// Función para crear juego
function crearJuego(nombreJuego, buildFunction) {
  const container = document.getElementById('gameContainer');
  container.innerHTML = '';
  
  if (typeof buildFunction === 'function') {
    buildFunction(container);
  } else {
    console.error('Función', nombreJuego, 'no encontrada');
    container.innerHTML = '<h1 style="color:red">Error: Juego no cargó</h1>';
  }
}

// Escuchar clicks en botones de juegos
document.addEventListener('click', (e) => {
  if (e.target.dataset.juego) {
    const nombreJuego = e.target.dataset.juego;
    const functionName = 'build' + nombreJuego.charAt(0).toUpperCase() + nombreJuego.slice(1);
    
    console.log('Intentando cargar:', functionName);
    
    const buildFunc = window[functionName];
    if (buildFunc) {
      crearJuego(nombreJuego, buildFunc);
    } else {
      console.error('No encontrada:', functionName);
      alert('Error: El juego ' + nombreJuego + ' no está disponible');
    }
  }
});

// Mostrar menú inicial
function mostrarInicio() {
  const container = document.getElementById('gameContainer');
  container.innerHTML = `
    <div style="text-align:center;color:white;padding:40px">
      <h1 style="font-size:3rem;margin-bottom:20px">🎮 HugoKids</h1>
      <p style="font-size:1.2rem;margin-bottom:40px">Elige un juego para empezar</p>
      
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;max-width:600px;margin:0 auto">
        <button data-juego="jump" style="padding:20px;background:#FF6B00;color:white;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem">🦘 Jump</button>
        <button data-juego="racing" style="padding:20px;background:#FF4D9D;color:white;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem">🏎️ Racing</button>
        <button data-juego="platform" style="padding:20px;background:#00B4D8;color:white;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem">🎯 Platform</button>
        <button data-juego="dungeon" style="padding:20px;background:#7C3AED;color:white;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem">⚔️ Dungeon</button>
        <button data-juego="snake" style="padding:20px;background:#00D68F;color:white;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem">🐍 Snake</button>
        <button data-juego="flappy" style="padding:20px;background:#FFD600;color:#2D1B4E;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem">🐦 Flappy</button>
      </div>
    </div>
  `;
}

// Iniciar
window.addEventListener('load', () => {
  console.log('✅ HugoKids cargado');
  console.log('✅ Juegos disponibles:', Object.keys(window).filter(k => k.startsWith('build')).length);
  mostrarInicio();
});
</script>
