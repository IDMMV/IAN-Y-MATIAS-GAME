<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HugoKids 🎮</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  
  :root {
    --primary: #7C3AED;
    --secondary: #FF4D9D;
    --accent: #FFD600;
    --action: #00D68F;
    --text: #2D1B4E;
    --muted: #7A6B9D;
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: linear-gradient(135deg, #FF9A3C 0%, #FF4D9D 45%, #7C3AED 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
  }
  
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(16px);
    border-bottom: 4px solid var(--accent);
    padding: 0 24px;
    height: 70px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(124,58,237,0.15);
  }
  
  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  
  .hud {
    position: fixed; top: 70px; left: 0; right: 0; z-index: 99;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px 20px;
    display: flex; gap: 20px; align-items: center;
    font-weight: 800;
    font-size: 1.1rem;
  }
  
  .hud-item { display: flex; align-items: center; gap: 8px; }
  
  #gameContainer { 
    position: relative; 
    z-index: 1; 
    padding: 20px; 
    margin-top: 60px; 
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════════ -->
<!-- IMPORTAR TODOS LOS 49 JUEGOS DESDE /juegos/ -->
<!-- ═══════════════════════════════════════════════════════════════════════════ -->

<script src="juegos/2048.js"></script>
<script src="juegos/ahorcadoOnline.js"></script>
<script src="juegos/animales.js"></script>
<script src="juegos/breakout.js"></script>
<script src="juegos/burbujas.js"></script>
<script src="juegos/c4Online.js"></script>
<script src="juegos/cajasOnline.js"></script>
<script src="juegos/catch.js"></script>
<script src="juegos/colores.js"></script>
<script src="juegos/damasOnline.js"></script>
<script src="juegos/defender.js"></script>
<script src="juegos/dungeon.js"></script>
<script src="juegos/eduQuiz.js"></script>
<script src="juegos/extraOnlineGame.js"></script>
<script src="juegos/flappy.js"></script>
<script src="juegos/formas.js"></script>
<script src="juegos/globos.js"></script>
<script src="juegos/idle.js"></script>
<script src="juegos/jump.js"></script>
<script src="juegos/letras.js"></script>
<script src="juegos/level.js"></script>
<script src="juegos/ludoOnline.js"></script>
<script src="juegos/map.js"></script>
<script src="juegos/maze.js"></script>
<script src="juegos/memory.js"></script>
<script src="juegos/merge.js"></script>
<script src="juegos/multitud.js"></script>
<script src="juegos/navalOnline.js"></script>
<script src="juegos/numeros.js"></script>
<script src="juegos/palabra.js"></script>
<script src="juegos/piano.js"></script>
<script src="juegos/pintar.js"></script>
<script src="juegos/platform.js"></script>
<script src="juegos/pong.js"></script>
<script src="juegos/quiz.js"></script>
<script src="juegos/racing.js"></script>
<script src="juegos/reaction.js"></script>
<script src="juegos/runner.js"></script>
<script src="juegos/silabas.js"></script>
<script src="juegos/simon.js"></script>
<script src="juegos/snake.js"></script>
<script src="juegos/ticTacToe.js"></script>
<script src="juegos/tocar.js"></script>
<script src="juegos/torre.js"></script>
<script src="juegos/treasure.js"></script>
<script src="juegos/tttOnline.js"></script>
<script src="juegos/vocales.js"></script>
<script src="juegos/whack.js"></script>
<script src="juegos/yankenPoGame.js"></script>

<!-- NAVBAR -->
<nav>
  <div class="logo">Hugo<span style="color:#FFD600">Kids</span> 🎮</div>
  <span id="coinDisplay">🪙 0</span>
</nav>

<!-- HUD -->
<div class="hud">
  <div class="hud-item">❤️ <span id="vidasDisplay">5</span> vidas</div>
  <div class="hud-item">🪙 <span id="monedasDisplay">0</span> monedas</div>
  <div class="hud-item">📊 Nivel <span id="nivelDisplay">1</span>/5</div>
  <button onclick="abrirTienda()" style="background:#00D68F;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:800">🛒 Tienda</button>
  <button onclick="cerrarJuego()" style="background:#FF4D9D;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:800">❌ Salir</button>
</div>

<!-- CONTENEDOR DE JUEGO -->
<div id="gameContainer" style="position:relative;z-index:1;padding:20px">
  <div style="text-align:center;padding:40px;color:white">
    <h1>🎮 HugoKids</h1>
    <p>Cargando 49 juegos...</p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// SISTEMAS GLOBALES - VIDAS, MONEDAS, TIENDA, POTENCIADORES
// ═══════════════════════════════════════════════════════════════════════════

window.hkVidas = 5;
window.hkMonedas = 0;
window.hkNivel = 1;
window.hkPotenciadores = {};
window.monedasGanadas = 0;

// SISTEMA DE VIDAS
window.perderVida = function() {
  if (window.hkVidas > 0) {
    window.hkVidas--;
    actualizarHUD();
    console.log('❌ Vidas:', window.hkVidas);
    if (window.hkVidas <= 0) {
      mostrarGameOver();
    }
  }
};

window.ganarVida = function() { window.hkVidas++; actualizarHUD(); };
window.resetearVidas = function() { window.hkVidas = 5; actualizarHUD(); };

// SISTEMA DE MONEDAS
window.ganarMonedas = function(cantidad) {
  window.hkMonedas += cantidad;
  window.monedasGanadas += cantidad;
  actualizarHUD();
  console.log('✅ +' + cantidad + ' monedas. Total:', window.hkMonedas);
};

window.gastarMonedas = function(cantidad) {
  if (window.hkMonedas >= cantidad) {
    window.hkMonedas -= cantidad;
    actualizarHUD();
    console.log('💸 -' + cantidad + ' monedas. Total:', window.hkMonedas);
    return true;
  }
  return false;
};

window.resetearMonedas = function() { window.hkMonedas = 0; window.monedasGanadas = 0; actualizarHUD(); };

// SISTEMA DE NIVELES
window.subirNivel = function() {
  if (window.hkNivel < 5) {
    window.hkNivel++;
    actualizarHUD();
    console.log('📈 Nivel:', window.hkNivel);
    return true;
  }
  return false;
};

window.resetearNivel = function() { window.hkNivel = 1; actualizarHUD(); };

// SISTEMA DE POTENCIADORES
window.activarPotenciador = function(tipo) {
  window.hkPotenciadores[tipo] = true;
  setTimeout(() => { window.hkPotenciadores[tipo] = false; }, 10000);
};

window.tienePotenciador = function(tipo) { return window.hkPotenciadores[tipo] || false; };

// HUD
window.actualizarHUD = function() {
  document.getElementById('vidasDisplay').textContent = window.hkVidas;
  document.getElementById('monedasDisplay').textContent = window.hkMonedas;
  document.getElementById('nivelDisplay').textContent = window.hkNivel;
  document.getElementById('coinDisplay').textContent = '🪙 ' + window.hkMonedas;
};

// CREAR JUEGO
window.crearJuego = function(nombreJuego, buildFunction) {
  const container = document.getElementById('gameContainer');
  container.innerHTML = '';
  
  if (typeof buildFunction === 'function') {
    console.log('🎮 Iniciando:', nombreJuego);
    buildFunction(container);
  } else {
    console.error('❌ No encontrada:', nombreJuego);
    container.innerHTML = '<h1 style="color:red">Error: Juego no cargó</h1>';
  }
};

// TIENDA
window.abrirTienda = function() {
  alert('🛒 TIENDA\n\n1. Escudo (50 monedas)\n2. Velocidad (40 monedas)\n3. Doble Monedas (60 monedas)\n4. Magnetismo (55 monedas)\n\nTienda en desarrollo...');
};

// GAME OVER
window.mostrarGameOver = function() {
  alert('💀 GAME OVER\n\nNivel: ' + window.hkNivel + '\nMonedas ganadas: ' + window.monedasGanadas);
  mostrarInicio();
};

// CERRAR JUEGO
window.cerrarJuego = function() { mostrarInicio(); };

// MENÚ INICIAL
window.mostrarInicio = function() {
  window.resetearVidas();
  window.resetearMonedas();
  window.resetearNivel();
  
  const container = document.getElementById('gameContainer');
  container.innerHTML = `
    <div style="text-align:center;color:white;padding:40px">
      <h1 style="font-size:3rem;margin-bottom:20px">🎮 HugoKids</h1>
      <p style="font-size:1.2rem;margin-bottom:40px">49 Juegos Increíbles</p>
      
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;max-width:900px;margin:0 auto">
        <button onclick="crearJuego('Jump', window.buildJump)" style="padding:20px;background:#FF6B00;color:white;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem">🦘 Jump</button>
        <button onclick="crearJuego('Racing', window.buildRacing)" style="padding:20px;background:#FF4D9D;color:white;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem">🏎️ Racing</button>
        <button onclick="crearJuego('Platform', window.buildPlatform)" style="padding:20px;background:#00B4D8;color:white;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem">🎯 Platform</button>
        <button onclick="crearJuego('Dungeon', window.buildDungeon)" style="padding:20px;background:#7C3AED;color:white;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem">⚔️ Dungeon</button>
        <button onclick="crearJuego('Snake', window.buildSnake)" style="padding:20px;background:#00D68F;color:white;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem">🐍 Snake</button>
        <button onclick="crearJuego('Flappy', window.buildFlappy)" style="padding:20px;background:#FFD600;color:#2D1B4E;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem">🐦 Flappy</button>
      </div>
    </div>
  `;
  actualizarHUD();
};

// INICIALIZAR
window.addEventListener('load', () => {
  console.log('✅ HugoKids v75 - MODULAR - Cargado');
  console.log('✅ Juegos disponibles:', Object.keys(window).filter(k => k.startsWith('build')).length);
  mostrarInicio();
});
</script>

</body>
</html>
